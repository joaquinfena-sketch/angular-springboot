<header class="header" [ngClass]="{ pink: tone === 'pink' }">
  <a
    *ngIf="auth.loggedIn()"
    class="home-link"
    mat-icon-button
    routerLink="/home"
    aria-label="Ir a inicio"
    title="Inicio"
  >
    <mat-icon>home</mat-icon>
  </a>

  <div class="title">{{ title }}</div>

  <div class="buttons" *ngIf="showProvinceButtons">
    <!-- Botón maestro -->
    <button
      mat-raised-button
      color="primary"
      class="province-btn"
      [class.selected]="isAndaluciaSelected()"
      (click)="toggleAndalucia()"
    >
      Andalucía
    </button>

    <!-- Provincias -->
    <button
      *ngFor="let p of provinces"
      mat-raised-button
      color="primary"
      class="province-btn"
      [class.selected]="selection.isSelected(p)"
      (click)="selection.toggle(p)"
    >
      {{ p }}
    </button>
  </div>
</header>
