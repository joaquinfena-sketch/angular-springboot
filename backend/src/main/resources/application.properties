# DataSource y JdbcClient se usan; Hibernate excluido en ProyectoBackendApplication (mapa con datos aleatorios).
spring.jpa.defer-datasource-initialization=true
# No escanear repos JPA (evita que pida EntityManagerFactory).
spring.data.jpa.repositories.enabled=false

# H2 en fichero (persistente)
spring.datasource.url=jdbc:h2:file:./data/proyecto_backend;MODE=PostgreSQL;DATABASE_TO_UPPER=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Consola H2 (para ver tablas/datos)
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# JWT (en producción usar variable de entorno app.jwt.secret)
app.jwt.secret=${JWT_SECRET:clave-secreta-muy-larga-minimo-256-bits-para-hs256-por-seguridad}
app.jwt.expiration-ms=86400000
