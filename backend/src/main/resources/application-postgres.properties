# --- PostgreSQL profile ---
spring.datasource.url=jdbc:postgresql://192.168.0.11:5432/postgres?currentSchema=arena2

spring.datasource.username=postgres
spring.datasource.password=%%%postgres$$$

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Recomendado: quitar Open-In-View (más pro)
spring.jpa.open-in-view=false

# No usar JPA de momento (hasta definir bien las consultas/tablas reales)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
